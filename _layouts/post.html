---
layout: default
---

<article class="post-content">
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    <time>{{ page.date | date: "%Y-%m-%d" }}</time>
    {% if page.categories %}
      <span> • {{ page.categories | join: ", " }}</span>
    {% endif %}
  </div>

  {{ content }}

  {% if page.tags %}
  <div class="post-tags" style="margin-top: 40px;">
    <span style="color: #666;">标签:</span>
    {% for tag in page.tags %}
      <span class="post-tag">{{ tag }}</span>
    {% endfor %}
  </div>
  {% endif %}
</article>
